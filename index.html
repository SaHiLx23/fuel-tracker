<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fuel Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f8;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.vehicle-cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
margin-bottom:10px;
}

.vehicle-card{
background:#eef2ff;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.vehicle-card.active{
background:#2c7be5;
color:white;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
}

button{
background:#2c7be5;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.summary{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.summary div{
background:white;
padding:10px;
border-radius:8px;
text-align:center;
box-shadow:0 1px 4px rgba(0,0,0,0.1);
}

.table-wrap{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

canvas{
margin-top:20px;
}

.fab{
position:fixed;
bottom:20px;
right:20px;
background:#2c7be5;
color:white;
font-size:26px;
border-radius:50%;
width:55px;
height:55px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

@media(max-width:700px){

.grid{
grid-template-columns:1fr;
}

.summary{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<h2>Fuel Tracker</h2>

<div class="card">

<h3>Vehicles</h3>

<div class="vehicle-cards" id="vehicleCards"></div>

<input id="vehicleName" placeholder="Add vehicle">
<button onclick="addVehicle()">Add Vehicle</button>

</div>


<div class="summary">

<div>Total Cost<br>₹ <span id="totalCost">0</span></div>

<div>Average Mileage<br><span id="avgMileage">0</span></div>

<div>Cost/KM<br>₹ <span id="costKm">0</span></div>

<div>Monthly Cost<br>₹ <span id="monthCost">0</span></div>

<div>Projected Monthly<br>₹ <span id="projectedCost">0</span></div>

<div>Efficiency Score<br><span id="effScore">0</span></div>

</div>


<div class="card">

<h3>Add Fuel Entry</h3>

<div class="grid">

<div>
<label>Date</label>
<input id="date" type="date">
</div>

<div>
<label>Odometer KM</label>
<input id="km">
</div>

<div>
<label>Fuel Liters</label>
<input id="liters">
</div>

<div>
<label>Total Price</label>
<input id="price">
</div>

</div>

<button onclick="addFuel()">Save Entry</button>

</div>


<div class="card">

<h3>Fuel History</h3>

<div class="table-wrap">

<table>

<thead>
<tr>
<th>Date</th>
<th>KM</th>
<th>Liters</th>
<th>Price</th>
<th>Price/L</th>
<th>Mileage</th>
<th>Cost/KM</th>
<th>Edit</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

</div>

</div>


<div class="card">

<h3>Analytics</h3>

<canvas id="monthlyChart"></canvas>
<canvas id="mileageChart"></canvas>
<canvas id="priceChart"></canvas>

</div>


<div class="card">

<h3>Data Management</h3>

<button onclick="exportCSV()">Export CSV</button>
<button onclick="exportBackup()">Backup JSON</button>

<input type="file" onchange="importBackup(event)">

<button onclick="clearVehicleData()">Clear Vehicle Data</button>
<button onclick="clearAllData()">Reset App</button>

</div>

</div>


<script>

let vehicles=JSON.parse(localStorage.getItem("vehicles")||"[]")
let logs=JSON.parse(localStorage.getItem("logs")||"[]")

let selectedVehicle=vehicles[0]||null

function save(){

localStorage.setItem("vehicles",JSON.stringify(vehicles))
localStorage.setItem("logs",JSON.stringify(logs))

}

function renderVehicles(){

let html=""

vehicles.forEach(v=>{

html+=`
<div class="vehicle-card ${v===selectedVehicle?'active':''}"
onclick="selectVehicle('${v}')">

🚗<br>${v}

</div>
`

})

document.getElementById("vehicleCards").innerHTML=html

}

function selectVehicle(v){

selectedVehicle=v

renderVehicles()

render()

}

function addVehicle(){

let name=document.getElementById("vehicleName").value

if(!name)return

vehicles.push(name)

selectedVehicle=name

save()

renderVehicles()

}

function addFuel(){

let entry={
vehicle:selectedVehicle,
date:date.value,
km:Number(km.value),
liters:Number(liters.value),
price:Number(price.value)
}

logs.push(entry)

save()

render()

}

function render(){

let data=logs.filter(l=>l.vehicle===selectedVehicle)

let prev=null

let html=""

let totalCost=0
let totalDistance=0

let mileageArr=[]
let labels=[]

data.forEach(d=>{

let mileage="-"
let costKm="-"

if(prev!=null){

let dist=d.km-prev

mileage=(dist/d.liters).toFixed(2)

costKm=(d.price/dist).toFixed(2)

totalDistance+=dist

mileageArr.push(mileage)

labels.push(d.date)

}

prev=d.km

let ppl=(d.price/d.liters).toFixed(2)

totalCost+=d.price

html+=`
<tr>
<td>${d.date}</td>
<td>${d.km}</td>
<td>${d.liters}</td>
<td>${d.price}</td>
<td>${ppl}</td>
<td>${mileage}</td>
<td>${costKm}</td>
<td><button onclick="editEntry(${logs.indexOf(d)})">Edit</button></td>
<td><button onclick="deleteEntry(${logs.indexOf(d)})">Delete</button></td>
</tr>
`

})

history.innerHTML=html

totalCostEl.innerText=totalCost.toFixed(2)

let avg=(mileageArr.reduce((a,b)=>a+Number(b),0)/mileageArr.length)||0

avgMileage.innerText=avg.toFixed(2)

let cost=(totalCost/totalDistance)||0

costKm.innerText=cost.toFixed(2)

calculateMonthly()

drawCharts(labels,mileageArr)

efficiencyScore(avg)

}

function calculateMonthly(){

let now=new Date()

let m=now.getMonth()
let y=now.getFullYear()

let cost=0

logs.forEach(l=>{

let d=new Date(l.date)

if(d.getMonth()==m && d.getFullYear()==y){

cost+=l.price

}

})

monthCost.innerText=cost.toFixed(2)

let today=now.getDate()

let days=new Date(y,m+1,0).getDate()

projectedCost.innerText=((cost/today)*days).toFixed(2)

}

function efficiencyScore(avg){

let score="Average"

if(avg>50)score="Excellent"
else if(avg>40)score="Good"
else if(avg>30)score="Average"
else score="Poor"

effScore.innerText=score

}

function drawCharts(labels,mileage){

new Chart(mileageChart,{
type:"line",
data:{labels:labels,datasets:[{label:"Mileage Trend",data:mileage}]}
})

let monthly={}

logs.forEach(l=>{
let m=l.date.slice(0,7)
if(!monthly[m])monthly[m]=0
monthly[m]+=l.price
})

new Chart(monthlyChart,{
type:"bar",
data:{labels:Object.keys(monthly),datasets:[{label:"Monthly Fuel Cost",data:Object.values(monthly)}]}
})

let priceTrend=[]
let dates=[]

logs.forEach(l=>{
priceTrend.push((l.price/l.liters).toFixed(2))
dates.push(l.date)
})

new Chart(priceChart,{
type:"line",
data:{labels:dates,datasets:[{label:"Fuel Price/L Trend",data:priceTrend}]}
})

}

function editEntry(i){

let e=logs[i]

let d=prompt("Date",e.date)
let kmv=prompt("KM",e.km)
let lit=prompt("Liters",e.liters)
let pr=prompt("Price",e.price)

if(d){
e.date=d
e.km=Number(kmv)
e.liters=Number(lit)
e.price=Number(pr)

save()
render()
}

}

function deleteEntry(i){

if(confirm("Delete this entry?")){

logs.splice(i,1)

save()
render()

}

}

function clearVehicleData(){

logs=logs.filter(l=>l.vehicle!==selectedVehicle)

save()

render()

}

function clearAllData(){

if(confirm("Reset entire app?")){

vehicles=[]
logs=[]

localStorage.clear()

location.reload()

}

}

function exportCSV(){

let csv="date,km,liters,price\n"

logs.forEach(l=>{

csv+=`${l.date},${l.km},${l.liters},${l.price}\n`

})

let blob=new Blob([csv])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="fuel.csv"

a.click()

}

function exportBackup(){

let blob=new Blob([JSON.stringify({vehicles,logs})])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="backup.json"

a.click()

}

function importBackup(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(){

let data=JSON.parse(reader.result)

vehicles=data.vehicles
logs=data.logs

save()

renderVehicles()

render()

}

reader.readAsText(file)

}

renderVehicles()

render()

</script>

</body>
</html>
