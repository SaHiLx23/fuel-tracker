<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyDQu-PP2tRX1q8LQLx_HmiK6P53S7hQJhU",
  authDomain: "fuel-tracker-2baaf.firebaseapp.com",
  projectId: "fuel-tracker-2baaf",
  storageBucket: "fuel-tracker-2baaf.firebasestorage.app",
  messagingSenderId: "403213454298",
  appId: "1:403213454298:web:852d44e8febb4a975ecee3",
  measurementId: "G-LTE52QM0H6"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


window.addFuel = async function(){

let date=document.getElementById("date").value;
let km=document.getElementById("km").value;
let price=document.getElementById("price").value;

await addDoc(collection(db,"fuel_logs"),{
date:date,
km:km,
price:price
});

loadHistory();

}



async function loadHistory(){

const querySnapshot = await getDocs(collection(db,"fuel_logs"));

let html="";

querySnapshot.forEach((doc)=>{

let d=doc.data();

html += `
<tr>
<td>${d.date}</td>
<td>${d.km}</td>
<td>${d.price}</td>
</tr>
`;

});

document.getElementById("history").innerHTML=html;

}


window.onload = loadHistory;

</script>
