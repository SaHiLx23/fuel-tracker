<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Fuel Tracker</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<div class="topbar">

<h2>Fuel Tracker</h2>

<div>
<button id="themeBtn">Theme</button>
<button id="loginBtn">Login</button>
<button id="logoutBtn" style="display:none">Logout</button>
</div>

</div>

<p id="userInfo"></p>

<hr>

<h3>Add Vehicle</h3>

<input id="vehicleName" placeholder="Vehicle name">
<button onclick="addVehicle()">Add Vehicle</button>

<select id="vehicleSelect"></select>

<hr>

<h3>Add Fuel</h3>

<div class="grid">

<input type="date" id="date">
<input type="number" id="km" placeholder="KM">
<input type="number" id="liters" placeholder="Liters">
<input type="number" id="price" placeholder="Price">

</div>

<button onclick="addFuel()">Save Fuel</button>

<div class="stats">

<div class="card">
<h3>Total Cost</h3>
<p id="totalCost">0</p>
</div>

<div class="card">
<h3>Average Mileage</h3>
<p id="avgMileage">0</p>
</div>

<div class="card">
<h3>Cost/KM</h3>
<p id="costPerKm">0</p>
</div>

</div>

<canvas id="fuelChart"></canvas>

<table>

<thead>

<tr>
<th>Date</th>
<th>KM</th>
<th>Liters</th>
<th>Price</th>
<th>Mileage</th>
</tr>

</thead>

<tbody id="history"></tbody>

</table>

</div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/fuel.js"></script>
<script type="module" src="js/dashboard.js"></script>
<script type="module" src="js/theme.js"></script>

<script>
if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
