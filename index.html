<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Fuel Tracker</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:15px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

input,select{
padding:8px;
margin:5px;
}

button{
padding:8px 12px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

</style>

</head>


<body>

<div class="container">

<h2>Fuel Tracker</h2>

<button onclick="login()">Login with Google</button>

<p id="userName"></p>

<hr>

<h3>Add Vehicle</h3>

<input id="vehicleName" placeholder="Vehicle name">

<button onclick="addVehicle()">Add</button>

<br>

<select id="vehicleSelect"></select>

<hr>

<h3>Add Fuel</h3>

<input type="date" id="date">
<input type="number" id="km" placeholder="KM">
<input type="number" id="liters" placeholder="Liters">
<input type="number" id="price" placeholder="Price">

<button onclick="addFuel()">Save</button>

<table>

<thead>
<tr>
<th>Date</th>
<th>KM</th>
<th>Liters</th>
<th>Price</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


const firebaseConfig={
apiKey:"AIzaSyDQu-PP2tRX1q8LQLx_HmiK6P53S7hQJhU",
authDomain:"fuel-tracker-2baaf.firebaseapp.com",
projectId:"fuel-tracker-2baaf",
storageBucket:"fuel-tracker-2baaf.firebasestorage.app",
messagingSenderId:"403213454298",
appId:"1:403213454298:web:852d44e8febb4a975ecee3"
};


const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth();

let user;

window.login=async function(){

const provider=new GoogleAuthProvider();

const result=await signInWithPopup(auth,provider);

user=result.user;

document.getElementById("userName").innerText=user.displayName;

loadVehicles();

}

window.addVehicle=async function(){

let name=document.getElementById("vehicleName").value;

await addDoc(collection(db,"users",user.uid,"vehicles"),{
name:name
});

loadVehicles();

}

async function loadVehicles(){

const snapshot=await getDocs(
collection(db,"users",user.uid,"vehicles")
);

let select=document.getElementById("vehicleSelect");

select.innerHTML="";

snapshot.forEach(doc=>{

let option=document.createElement("option");

option.value=doc.id;
option.text=doc.data().name;

select.appendChild(option);

});

}

window.addFuel=async function(){

let vehicle=document.getElementById("vehicleSelect").value;

let date=document.getElementById("date").value;
let km=document.getElementById("km").value;
let liters=document.getElementById("liters").value;
let price=document.getElementById("price").value;

await addDoc(
collection(db,"users",user.uid,"vehicles",vehicle,"fuel_logs"),
{
date,km,liters,price
});

loadHistory();

}

async function loadHistory(){

let vehicle=document.getElementById("vehicleSelect").value;

const snapshot=await getDocs(
collection(db,"users",user.uid,"vehicles",vehicle,"fuel_logs")
);

let html="";

snapshot.forEach(doc=>{

let d=doc.data();

html+=`
<tr>
<td>${d.date}</td>
<td>${d.km}</td>
<td>${d.liters}</td>
<td>${d.price}</td>
</tr>
`;

});

document.getElementById("history").innerHTML=html;

}

</script>


<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js");

}

</script>

</body>
</html>
