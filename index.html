<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fuel Tracker Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#eef1f5;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.15);
}

h1{text-align:center;}

input{padding:8px;margin:5px;}

button{padding:8px 14px;cursor:pointer;}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#1e272e;
color:white;
}

.stats{
display:flex;
justify-content:space-between;
margin-top:20px;
}

.statbox{
background:#f1f2f6;
padding:15px;
border-radius:6px;
width:30%;
text-align:center;
font-weight:bold;
}

</style>
</head>


<body>

<div class="container">

<h1>Fuel Tracker Dashboard</h1>

<h3>Add Fuel Entry</h3>

Date <input type="date" id="date">
KM <input type="number" id="km">
Liters <input type="number" id="liters">
Price ₹ <input type="number" id="price">

<button onclick="addFuel()">Save</button>

<div class="stats">

<div class="statbox">
Total Fuel Cost
<div id="totalCost">0</div>
</div>

<div class="statbox">
Average Mileage
<div id="avgMileage">0</div>
</div>

<div class="statbox">
Cost per KM
<div id="costKM">0</div>
</div>

</div>

<h3>Fuel History</h3>

<table>

<thead>
<tr>
<th>Date</th>
<th>KM</th>
<th>Liters</th>
<th>Price</th>
<th>Mileage</th>
<th>Cost/KM</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

<h3>Fuel Cost Chart</h3>

<canvas id="fuelChart"></canvas>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDQu-PP2tRX1q8LQLx_HmiK6P53S7hQJhU",
authDomain: "fuel-tracker-2baaf.firebaseapp.com",
projectId: "fuel-tracker-2baaf",
storageBucket: "fuel-tracker-2baaf.firebasestorage.app",
messagingSenderId: "403213454298",
appId: "1:403213454298:web:852d44e8febb4a975ecee3",
measurementId: "G-LTE52QM0H6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addFuel = async function(){

let date=document.getElementById("date").value;
let km=parseFloat(document.getElementById("km").value);
let liters=parseFloat(document.getElementById("liters").value);
let price=parseFloat(document.getElementById("price").value);

if(!date||!km||!liters||!price){
alert("Fill all fields");
return;
}

await addDoc(collection(db,"fuel_logs"),{
date,
km,
liters,
price
});

loadHistory();
}

window.deleteEntry=async function(id){

await deleteDoc(doc(db,"fuel_logs",id));
loadHistory();

}


let chart;

async function loadHistory(){

const q=query(collection(db,"fuel_logs"),orderBy("km"));
const querySnapshot=await getDocs(q);

let html="";
let prevKM=null;

let totalCost=0;
let mileageSum=0;
let mileageCount=0;
let distanceSum=0;

let labels=[];
let costs=[];

querySnapshot.forEach((docSnap)=>{

let d=docSnap.data();

totalCost+=d.price;

labels.push(d.date);
costs.push(d.price);

let mileage="-";
let costKM="-";

if(prevKM!==null){

let distance=d.km-prevKM;
distanceSum+=distance;

mileage=(distance/d.liters).toFixed(2);
costKM=(d.price/distance).toFixed(2);

mileageSum+=parseFloat(mileage);
mileageCount++;

}

prevKM=d.km;

html+=`
<tr>
<td>${d.date}</td>
<td>${d.km}</td>
<td>${d.liters}</td>
<td>${d.price}</td>
<td>${mileage}</td>
<td>${costKM}</td>
<td>
<button onclick="deleteEntry('${docSnap.id}')">Delete</button>
</td>
</tr>
`;

});

document.getElementById("history").innerHTML=html;

let avgMileage=(mileageSum/mileageCount)||0;
let costPerKM=(totalCost/distanceSum)||0;

document.getElementById("totalCost").innerText="₹"+totalCost.toFixed(2);
document.getElementById("avgMileage").innerText=avgMileage.toFixed(2);
document.getElementById("costKM").innerText="₹"+costPerKM.toFixed(2);


if(chart) chart.destroy();

chart=new Chart(document.getElementById("fuelChart"),{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Fuel Cost",
data:costs
}]
}
});

}

window.onload=loadHistory;

</script>

</body>
</html>
