<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Fuel Tracker</title>

<link rel="manifest" href="manifest.json">

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f6f8;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

h1{
margin-top:0;
}

button{
padding:10px 15px;
background:#2f3640;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#353b48;
}

input,select{
padding:10px;
margin:5px 0;
width:100%;
}

.vehicleRow{
display:flex;
gap:10px;
}

.formGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#2f3640;
color:white;
}

.tableWrap{
overflow-x:auto;
}

@media(max-width:600px){

.vehicleRow{
flex-direction:column;
}

.formGrid{
grid-template-columns:1fr;
}

}

</style>

</head>


<body>

<div class="container">

<h1>Fuel Tracker</h1>

<button onclick="login()">Login with Google</button>

<p id="userInfo"></p>

<hr>

<h3>Add Vehicle</h3>

<div class="vehicleRow">

<input id="vehicleName" placeholder="Vehicle name">

<button onclick="addVehicle()">Add</button>

</div>

<select id="vehicleSelect"></select>

<hr>

<h3>Add Fuel</h3>

<div class="formGrid">

<input type="date" id="date">

<input type="number" id="km" placeholder="KM">

<input type="number" id="liters" placeholder="Liters">

<input type="number" id="price" placeholder="Price">

</div>

<button onclick="addFuel()">Save Fuel</button>

<div class="tableWrap">

<table>

<thead>

<tr>
<th>Date</th>
<th>KM</th>
<th>Liters</th>
<th>Price</th>
</tr>

</thead>

<tbody id="history"></tbody>

</table>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth,
GoogleAuthProvider,
signInWithRedirect,
getRedirectResult,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


const firebaseConfig={
apiKey:"AIzaSyDQu-PP2tRX1q8LQLx_HmiK6P53S7hQJhU",
authDomain:"fuel-tracker-2baaf.firebaseapp.com",
projectId:"fuel-tracker-2baaf",
storageBucket:"fuel-tracker-2baaf.firebasestorage.app",
messagingSenderId:"403213454298",
appId:"1:403213454298:web:852d44e8febb4a975ecee3"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth();

let user;
let unsubscribe;


window.login=function(){

const provider=new GoogleAuthProvider();
signInWithRedirect(auth,provider);

};


getRedirectResult(auth).catch(()=>{});


onAuthStateChanged(auth,(u)=>{

if(u){

user=u;

document.getElementById("userInfo").innerText=
"Logged in: "+user.email;

loadVehicles();

}

});


window.addVehicle=async function(){

if(!user){
alert("Login first");
return;
}

let name=document.getElementById("vehicleName").value;

if(!name){
alert("Enter vehicle name");
return;
}

await addDoc(collection(db,"users",user.uid,"vehicles"),{
name:name
});

document.getElementById("vehicleName").value="";

loadVehicles();

};


async function loadVehicles(){

const snapshot=await getDocs(
collection(db,"users",user.uid,"vehicles")
);

let select=document.getElementById("vehicleSelect");

select.innerHTML="";

snapshot.forEach(doc=>{

let option=document.createElement("option");

option.value=doc.id;
option.text=doc.data().name;

select.appendChild(option);

});

if(select.options.length>0){

select.selectedIndex=0;

loadHistory();

}

}


document.getElementById("vehicleSelect")
.addEventListener("change",loadHistory);


window.addFuel=async function(){

if(!user){
alert("Login first");
return;
}

let vehicle=document.getElementById("vehicleSelect").value;

if(!vehicle){
alert("Select vehicle");
return;
}

let date=document.getElementById("date").value;
let km=document.getElementById("km").value;
let liters=document.getElementById("liters").value;
let price=document.getElementById("price").value;

if(!date||!km||!liters||!price){
alert("Fill all fields");
return;
}

await addDoc(
collection(db,"users",user.uid,"vehicles",vehicle,"fuel_logs"),
{
date,
km:Number(km),
liters:Number(liters),
price:Number(price),
created:Date.now()
});

document.getElementById("date").value="";
document.getElementById("km").value="";
document.getElementById("liters").value="";
document.getElementById("price").value="";

};


function loadHistory(){

if(unsubscribe) unsubscribe();

let vehicle=document.getElementById("vehicleSelect").value;

unsubscribe=onSnapshot(
collection(db,"users",user.uid,"vehicles",vehicle,"fuel_logs"),
(snapshot)=>{

let html="";

snapshot.forEach(doc=>{

let d=doc.data();

html+=`
<tr>
<td>${d.date}</td>
<td>${d.km}</td>
<td>${d.liters}</td>
<td>${d.price}</td>
</tr>
`;

});

document.getElementById("history").innerHTML=html;

});

}

</script>


<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js");

}

</script>

</body>
</html>
